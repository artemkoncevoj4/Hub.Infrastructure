worker_processes auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Настройки кэша и таймаутов
    sendfile        on;
    keepalive_timeout  65;

    # Описываем наши микросервисы внутри Docker-сети
    upstream identity_service {
        server hub-identity-api:80; # Имя контейнера и его внутренний порт
    }

    server {
        listen 8080; # Порт, который слушает Nginx наружу

        # Маршрут для Identity API
        location /api/auth/ {
            proxy_pass http://identity_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Сюда в будущем добавишь другие микросервисы:
        # location /api/files/ {
        #     proxy_pass http://files_service;
        # }
    }
}