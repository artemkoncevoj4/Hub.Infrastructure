version: '5.1.3'

services:
  # Основная база данных
  postgres:
    image: postgres:18
    container_name: hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hub_user
      POSTGRES_PASSWORD: hub_password
      # Эта БД будет по умолчанию, позже EF Core сможет создавать свои схемы
      POSTGRES_DB: hub_db 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hub_network

  # Кэш и хранилище Refresh-токенов
  redis:
    image: redis:8.6
    container_name: hub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hub_network

  # Брокер сообщений (Event Bus)
  kafka:
    image: apache/kafka:4.3.0
    container_name: hub-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      # Включаем режим KRaft (без Zookeeper)
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # Настройка портов: 9092 для обмена сообщениями, 9093 для внутреннего контроллера
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      # Важный момент: указываем localhost для доступа снаружи (из IDE)
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      # Жестко ограничиваем потребление памяти Kafka (по 512 МБ), чтобы сэкономить ресурсы
      - KAFKA_HEAP_OPTS=-Xmx512m -Xms512m
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - hub_network
    # Графический интерфейс для управления Kafka
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: hub-kafka-ui
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      # Название твоего кластера (отображается в интерфейсе)
      - KAFKA_CLUSTERS_0_NAME=Hub-Local
      # Адрес брокера внутри сети Docker (имя контейнера : порт)
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    networks:
      - hub_network
  nginx:
    image: nginx:alpine
    container_name: hub-nginx
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      # Специфичная настройка для Linux: позволяет Nginx внутри контейнера 
      # достучаться до микросервисов, запущенных на хосте (на твоем компьютере)
      - "host.docker.internal:host-gateway"
    networks:
      - hub_network
# Именованные тома, чтобы данные не удалялись при перезапуске контейнеров
volumes:
  postgres_data:
  redis_data:
  kafka_data:

# Общая виртуальная сеть для микросервисов
networks:
  hub_network:
    driver: bridge